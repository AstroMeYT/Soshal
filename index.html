<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soshal - Scroll Edition</title>
    
    <!-- Material Symbols & Roboto Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E0E9;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-outline: #938F99;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.4), 0px 1px 2px 0px rgba(0,0,0,0.5);
            --md-elevation-3: 0px 4px 8px 3px rgba(0,0,0,0.5), 0px 1px 3px 0px rgba(0,0,0,0.6);
            --border-rad: 8px; /* Sharper global border radius */
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            margin: 0;
            padding: 0;
            overscroll-behavior-y: none; /* Prevents pull-to-refresh blank space */
        }

        /* Hide scrollbars globally for a native app feel */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }

        .m3-card {
            background-color: var(--md-sys-color-surface-variant);
            border-radius: var(--border-rad);
            padding: 16px;
            box-shadow: var(--md-elevation-1);
            margin-bottom: 16px;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1), opacity 0.3s ease;
        }

        .m3-input {
            width: 100%;
            padding: 16px;
            border-radius: var(--border-rad) var(--border-rad) 0 0;
            background-color: var(--md-sys-color-surface-variant);
            border-bottom: 1px solid var(--md-sys-color-on-surface-variant);
            color: var(--md-sys-color-on-surface);
            outline: none;
            transition: border-bottom-color 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .m3-input::placeholder, #create-post-content::placeholder {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.7;
        }
        .m3-input:focus {
            border-bottom: 2px solid var(--md-sys-color-primary);
            padding-bottom: 15px; 
        }

        .m3-button-filled {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border-radius: var(--border-rad);
            padding: 10px 24px;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .m3-button-filled:active {
            box-shadow: var(--md-elevation-1);
            opacity: 0.9;
            transform: scale(0.96);
        }

        .m3-button-text {
            color: var(--md-sys-color-primary);
            border-radius: var(--border-rad);
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .m3-button-text:active {
            background-color: rgba(208, 188, 255, 0.1);
            transform: scale(0.98);
        }

        .app-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .app-container.active { 
            display: flex; 
            animation: viewEnter 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
        }

        @keyframes viewEnter {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up-item {
            animation: viewEnter 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
            opacity: 0;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 100px; /* Space for FAB and Nav */
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: var(--md-sys-color-surface-variant);
            border-top: 1px solid var(--md-sys-color-outline);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .nav-tab:active {
            transform: scale(0.85);
        }

        .nav-tab.active {
            color: var(--md-sys-color-primary);
        }

        .nav-tab .material-symbols-outlined {
            font-size: 28px;
            transition: font-variation-settings 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        /* Floating Action Button (Square-ish) */
        .m3-fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border-radius: var(--border-rad); 
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--md-elevation-3);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
            z-index: 40;
            -webkit-tap-highlight-color: transparent;
        }
        .m3-fab:active { transform: scale(0.9); }

        /* Post Interactions */
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: var(--border-rad);
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { 
            background-color: rgba(255, 255, 255, 0.05); 
            transform: scale(0.92);
        }
        .action-btn.liked { color: #d93025; }

        /* Sharper Avatar */
        .avatar-square {
            width: 40px;
            height: 40px;
            border-radius: var(--border-rad);
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .avatar-square:active { transform: scale(0.9); }

        /* Snackbar */
        #snackbar {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            text-align: center;
            border-radius: var(--border-rad);
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            font-size: 14px;
            box-shadow: var(--md-elevation-3);
        }
        #snackbar.show {
            visibility: visible;
            animation: fadein 0.3s, fadeout 0.3s 2.5s;
        }
        @keyframes fadein { from {bottom: 60px; opacity: 0;} to {bottom: 80px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 80px; opacity: 1;} to {bottom: 60px; opacity: 0;} }

        .hidden-by-default { display: none !important; }
        .app-container.active.hidden-by-default { display: flex !important; }
    </style>
</head>
<body>

    <!-- AUTHENTICATION VIEW -->
    <div id="view-auth" class="app-container flex-col items-center justify-center p-6 active bg-[var(--md-sys-color-surface)] z-50">
        <h1 class="text-4xl font-bold mb-8" style="color: var(--md-sys-color-primary)">Soshal</h1>
        <div class="w-full max-w-sm m3-card flex flex-col gap-4">
            <h2 id="auth-title" class="text-xl font-medium mb-2">Login</h2>
            <input type="text" id="auth-server" class="m3-input" placeholder="Server Address (ngrok/local)">
            <input type="text" id="auth-username" class="m3-input" placeholder="Username">
            <input type="password" id="auth-password" class="m3-input" placeholder="Password">
            <div class="mt-4 flex flex-col gap-2">
                <button id="btn-submit-auth" class="m3-button-filled w-full" onclick="submitAuth()">Login</button>
                <button id="btn-toggle-auth" class="m3-button-text w-full" onclick="toggleAuthMode()">Need an account? Sign up</button>
            </div>
        </div>
    </div>

    <!-- MAIN SCROLLING FEED VIEW (Global & Following) -->
    <div id="view-main" class="app-container hidden-by-default bg-[var(--md-sys-color-surface)]">
        <!-- Sticky Header -->
        <div class="w-full bg-[var(--md-sys-color-surface)] pt-4 pb-2 px-4 sticky top-0 z-10 border-b border-[var(--md-sys-color-outline)] shadow-sm">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <h1 class="text-2xl font-bold" style="color: var(--md-sys-color-primary)" id="feed-title">Explore</h1>
            </div>
        </div>

        <!-- Scrollable Feed -->
        <div class="scroll-area w-full max-w-md mx-auto" id="main-feed-container">
            <!-- Posts injected here -->
        </div>

        <!-- Create Post FAB -->
        <div class="m3-fab max-w-md mx-auto" onclick="switchView('view-create')">
            <span class="material-symbols-outlined" style="font-size: 28px;">edit</span>
        </div>
    </div>

    <!-- SEARCH VIEW -->
    <div id="view-search" class="app-container hidden-by-default bg-[var(--md-sys-color-surface)]">
        <!-- Sticky Search Header -->
        <div class="w-full bg-[var(--md-sys-color-surface)] pt-4 pb-2 px-4 sticky top-0 z-10 border-b border-[var(--md-sys-color-outline)] shadow-sm">
            <div class="max-w-md mx-auto flex flex-col gap-2">
                <h1 class="text-2xl font-bold mb-1" style="color: var(--md-sys-color-primary)">Search</h1>
                <input type="text" id="search-input" class="m3-input !rounded-lg" placeholder="Search posts, usernames, or unique IDs..." oninput="debounceSearch()">
                
                <!-- Type Toggle Chips -->
                <div class="flex gap-2 p-1 rounded-full w-full" style="background-color: var(--md-sys-color-surface-variant);">
                    <button id="search-type-posts" class="flex-1 py-1.5 rounded-full font-bold text-xs transition-all duration-300" style="background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);" onclick="setSearchType('posts')">Posts</button>
                    <button id="search-type-users" class="flex-1 py-1.5 rounded-full font-bold text-xs transition-all duration-300" style="color: var(--md-sys-color-on-surface);" onclick="setSearchType('users')">Users</button>
                </div>
            </div>
        </div>

        <!-- Scrollable Search Results -->
        <div class="scroll-area w-full max-w-md mx-auto" id="search-results-container">
            <div class="text-center mt-20 opacity-70">Start typing to search Soshal...</div>
        </div>

        <!-- Create Post FAB -->
        <div class="m3-fab max-w-md mx-auto" onclick="switchView('view-create')">
            <span class="material-symbols-outlined" style="font-size: 28px;">edit</span>
        </div>
    </div>

    <!-- PROFILE VIEW -->
    <div id="view-profile" class="app-container hidden-by-default bg-[var(--md-sys-color-surface)]">
        <div class="w-full bg-[var(--md-sys-color-surface)] pt-4 pb-2 px-4 sticky top-0 z-10 border-b border-[var(--md-sys-color-outline)] shadow-sm">
            <div class="flex justify-between items-center max-w-md mx-auto w-full">
                <div class="flex items-center gap-4">
                    <span class="material-symbols-outlined cursor-pointer transition-transform duration-200 active:-translate-x-1" id="profile-back-btn" onclick="openTab('global')">arrow_back</span>
                    <h2 class="text-xl font-bold" id="profile-header-title">Profile</h2>
                </div>
                <!-- Troubleshooting logout button: configured to be visible proactively -->
                <span class="material-symbols-outlined cursor-pointer text-red-400 hidden transition-transform duration-200 active:scale-90" id="profile-logout-btn" onclick="logout()" title="Logout">logout</span>
            </div>
        </div>

        <div class="scroll-area w-full max-w-md mx-auto">
            <!-- Profile Info Header -->
            <div class="flex flex-col items-center mb-6 pt-4">
                <div class="w-24 h-24 avatar-square text-4xl mb-4" id="profile-avatar">?</div>
                <h3 class="text-2xl font-bold mb-2"><span id="profile-username">User</span> <span id="profile-discriminator" class="text-sm opacity-50 font-normal"></span></h3>
                
                <div class="flex gap-8 mb-4">
                    <div class="text-center">
                        <div class="font-bold text-xl" id="profile-followers">0</div>
                        <div class="text-sm opacity-70">Followers</div>
                    </div>
                    <div class="text-center">
                        <div class="font-bold text-xl" id="profile-following">0</div>
                        <div class="text-sm opacity-70">Following</div>
                    </div>
                </div>
                
                <button id="btn-follow" class="m3-button-filled mt-2" onclick="toggleFollow()">Follow</button>
            </div>

            <hr class="border-[var(--md-sys-color-outline)] opacity-30 mb-4">
            
            <!-- User's Posts Grid/List -->
            <div class="w-full" id="profile-posts-container">
               <!-- vertical list of posts -->
            </div>
        </div>

        <!-- Create Post FAB -->
        <div class="m3-fab max-w-md mx-auto" onclick="switchView('view-create')">
            <span class="material-symbols-outlined" style="font-size: 28px;">edit</span>
        </div>
    </div>

    <!-- CREATE POST VIEW -->
    <div id="view-create" class="app-container hidden-by-default p-4 bg-[var(--md-sys-color-surface)] z-50">
        <div class="w-full max-w-md mx-auto flex items-center mb-6 py-4 border-b border-[var(--md-sys-color-outline)] pb-4">
            <span class="material-symbols-outlined cursor-pointer mr-4 transition-transform duration-200 active:scale-90" onclick="closeCreateView()">close</span>
            <h2 class="text-xl font-medium">Create Post</h2>
            <div class="flex-1"></div>
            <button class="m3-button-filled py-2 px-4" onclick="submitPost()">Post</button>
        </div>
        
        <div class="w-full max-w-md mx-auto flex-1 flex flex-col relative">
            <textarea id="create-post-content" class="w-full flex-1 bg-transparent text-xl outline-none resize-none transition-opacity duration-300" placeholder="What's happening? (Type @ to mention someone)"></textarea>
            
            <!-- FLOATING AUTOCOMPLETE SUGGESTION MENU FOR MENTIONS -->
            <div id="mention-dropdown" class="absolute hidden z-[60] bg-[var(--md-sys-color-surface-variant)] border border-[var(--md-sys-color-outline)] rounded shadow-lg max-h-48 overflow-y-auto w-64">
                <!-- Injected via javascript -->
            </div>

            <div id="image-preview-container" class="hidden w-full mb-4 relative rounded-lg overflow-hidden bg-black/20 h-48 border border-[var(--md-sys-color-outline)] fade-up-item">
                <img id="image-preview" src="" class="w-full h-full object-cover">
                <div class="absolute top-2 right-2 bg-black/50 rounded p-1 cursor-pointer flex items-center justify-center transition-transform duration-200 active:scale-90" onclick="clearImageSelection()">
                    <span class="material-symbols-outlined text-white" style="font-size: 20px;">close</span>
                </div>
            </div>
            
            <div class="flex border-t border-[var(--md-sys-color-outline)] pt-4 mt-auto pb-4">
                <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageSelection(event)">
                <button class="action-btn" style="background-color: var(--md-sys-color-surface-variant);" onclick="document.getElementById('image-input').click()">
                    <span class="material-symbols-outlined">image</span> Add Image
                </button>
            </div>
        </div>
    </div>

    <!-- GLOBAL BOTTOM NAV BAR -->
    <div id="global-bottom-nav" class="bottom-nav hidden">
        <div class="nav-tab active" id="tab-global" onclick="openTab('global')">
            <span class="material-symbols-outlined" id="icon-global" style="font-variation-settings: 'FILL' 1;">explore</span>
        </div>
        <div class="nav-tab" id="tab-following" onclick="openTab('following')">
            <span class="material-symbols-outlined" id="icon-following">group</span>
        </div>
        <div class="nav-tab" id="tab-search" onclick="openTab('search')">
            <span class="material-symbols-outlined" id="icon-search">search</span>
        </div>
        <div class="nav-tab" id="tab-profile" onclick="openTab('profile')">
            <span class="material-symbols-outlined" id="icon-profile">person</span>
        </div>
    </div>

    <!-- IMAGE LIGHTBOX VIEW -->
    <div id="image-lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden flex-col items-center justify-center p-4 cursor-pointer transition-opacity duration-300 opacity-0" onclick="closeImageLightbox()">
        <div class="absolute top-6 right-6 bg-white/20 rounded w-10 h-10 flex items-center justify-center transition-transform duration-200 active:scale-90 hover:bg-white/30">
            <span class="material-symbols-outlined text-white">close</span>
        </div>
        <img id="lightbox-img" src="" class="max-w-full max-h-full object-contain rounded transition-transform duration-300 ease-out scale-95" onclick="event.stopPropagation()">
    </div>

    <div id="snackbar">Message</div>

    <script>
        let API_BASE = 'https://dermal-brinda-marshier.ngrok-free.dev/api';
        
        let isSignupMode = false;
        let currentTab = 'global';
        let currentProfileUser = null;
        let isFollowingCurrentProfile = false;
        let currentSelectedImage = null;
        
        // Search and Autocomplete state
        let currentSearchType = 'posts';
        let searchTimeout = null;
        let activeMentionIndex = -1;
        
        // Post Cache allows linking specific posts by ID to update likes uniformly
        let postCache = {}; 

        const AuthStorage = {
            save: (token, username) => {
                localStorage.setItem('soshal_session_token', token);
                localStorage.setItem('soshal_username', username);
            },
            get: () => localStorage.getItem('soshal_session_token'),
            getUser: () => localStorage.getItem('soshal_username') || 'unknown',
            clear: () => {
                localStorage.removeItem('soshal_session_token');
                localStorage.removeItem('soshal_username');
            }
        };

        const LikeStorage = {
            getKey: () => `soshal_likes_${AuthStorage.getUser()}`,
            get: () => JSON.parse(localStorage.getItem(LikeStorage.getKey()) || '[]'),
            add: (id) => { 
                const l = LikeStorage.get(); 
                if(!l.includes(id)) { l.push(id); localStorage.setItem(LikeStorage.getKey(), JSON.stringify(l)); } 
            },
            remove: (id) => { 
                const l = LikeStorage.get().filter(x => x !== id); 
                localStorage.setItem(LikeStorage.getKey(), JSON.stringify(l)); 
            },
            has: (id) => LikeStorage.get().includes(id)
        };

        // Deterministic Avatar Colors based on length
        function getAvatarColor(username) {
            const colors = [
                '#6200EE', '#3700B3', '#03DAC6', '#018786', 
                '#B00020', '#CF6679', '#FF0266', '#FF5722', 
                '#4CAF50', '#00BCD4', '#9C27B0', '#3F51B5'
            ];
            const index = username.length % colors.length;
            return colors[index];
        }

        window.onload = () => {
            // Load saved server address or default
            let savedServer = localStorage.getItem('soshal_server_address') || 'https://dermal-brinda-marshier.ngrok-free.dev';
            document.getElementById('auth-server').value = savedServer;
            updateApiBase(savedServer);

            if (AuthStorage.get()) {
                document.getElementById('global-bottom-nav').classList.remove('hidden');
                openTab('global');
            } else {
                switchView('view-auth');
            }

            // Setup the autocomplete listeners
            const textarea = document.getElementById('create-post-content');
            textarea.addEventListener('input', handlePostContentInput);
            textarea.addEventListener('click', handlePostContentInput);
        };

        function updateApiBase(serverUrl) {
            let base = serverUrl.trim();
            if (base.endsWith('/')) {
                base = base.slice(0, -1);
            }
            if (!base.startsWith('http://') && !base.startsWith('https://')) {
                base = 'https://' + base;
            }
            localStorage.setItem('soshal_server_address', base);
            API_BASE = `${base}/api`;
        }

        function switchView(viewId) {
            document.querySelectorAll('.app-container').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            // Hide bottom nav strictly in Auth or Create Post mode
            if(viewId === 'view-auth' || viewId === 'view-create') {
                document.getElementById('global-bottom-nav').style.display = 'none';
            } else {
                document.getElementById('global-bottom-nav').style.display = 'flex';
            }
        }

        function closeCreateView() {
            if (currentTab === 'profile') {
                switchView('view-profile');
            } else if (currentTab === 'search') {
                switchView('view-search');
            } else {
                switchView('view-main');
            }
        }

        // --- BOTTOM NAV TABS ---
        function openTab(tabName) {
            currentTab = tabName;
            
            // Reset visual active states
            ['global', 'following', 'search', 'profile'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                const icon = document.getElementById(`icon-${t}`);
                if (t === tabName) {
                    el.classList.add('active');
                    icon.style.fontVariationSettings = "'FILL' 1";
                } else {
                    el.classList.remove('active');
                    icon.style.fontVariationSettings = "'FILL' 0";
                }
            });

            if (tabName === 'global' || tabName === 'following') {
                switchView('view-main');
                document.getElementById('feed-title').innerText = tabName === 'global' ? 'Explore' : 'Following';
                fetchFeedPosts(tabName);
            } else if (tabName === 'search') {
                switchView('view-search');
                performSearch();
            } else if (tabName === 'profile') {
                openProfile(AuthStorage.getUser(), true);
            }
        }

        /* Caret Coordinate Finder helper for positioning autocomplete menu overlay */
        function getCaretCoordinates(element, position) {
            const div = document.createElement('div');
            const style = window.getComputedStyle(element);
            for (const prop of style) {
                div.style[prop] = style[prop];
            }
            div.style.position = 'absolute';
            div.style.visibility = 'hidden';
            div.style.whiteSpace = 'pre-wrap';
            div.style.wordWrap = 'break-word';
            
            const text = element.value.substring(0, position);
            div.textContent = text;
            
            const span = document.createElement('span');
            span.textContent = element.value.substring(position) || '.';
            div.appendChild(span);
            
            document.body.appendChild(div);
            const { offsetLeft, offsetTop } = span;
            const rect = element.getBoundingClientRect();
            document.body.removeChild(div);
            
            return {
                left: element.offsetLeft + offsetLeft - element.scrollLeft,
                top: element.offsetTop + offsetTop - element.scrollTop
            };
        }

        async function handlePostContentInput() {
            const textarea = document.getElementById('create-post-content');
            const dropdown = document.getElementById('mention-dropdown');
            const caretPos = textarea.selectionStart;
            const textBefore = textarea.value.substring(0, caretPos);
            const lastAt = textBefore.lastIndexOf('@');

            if (lastAt !== -1 && !textBefore.substring(lastAt).includes(' ')) {
                const query = textBefore.substring(lastAt + 1);
                activeMentionIndex = lastAt;

                try {
                    const data = await apiRequest('/search', { query: query, type: 'users' });
                    if (data.results && data.results.length > 0) {
                        const coords = getCaretCoordinates(textarea, lastAt);
                        dropdown.style.left = `${coords.left}px`;
                        dropdown.style.top = `${coords.top + 24}px`;
                        dropdown.innerHTML = '';
                        
                        data.results.forEach(user => {
                            const option = document.createElement('div');
                            option.className = 'p-2 border-b border-zinc-700/50 cursor-pointer hover:bg-[var(--md-sys-color-primary-container)] hover:text-[var(--md-sys-color-on-primary-container)] text-sm font-medium';
                            option.innerHTML = `${user.username}<span class="opacity-50 text-xs">#${user.user_id}</span>`;
                            option.addEventListener('mousedown', (e) => {
                                e.preventDefault(); // prevents textarea from losing focus
                                insertMention(user.username, user.user_id);
                            });
                            dropdown.appendChild(option);
                        });
                        dropdown.classList.remove('hidden');
                    } else {
                        dropdown.classList.add('hidden');
                    }
                } catch(e) {
                    dropdown.classList.add('hidden');
                }
            } else {
                dropdown.classList.add('hidden');
            }
        }

        function insertMention(username, userId) {
            const textarea = document.getElementById('create-post-content');
            const dropdown = document.getElementById('mention-dropdown');
            const text = textarea.value;
            const before = text.substring(0, activeMentionIndex);
            const after = text.substring(textarea.selectionStart);
            
            textarea.value = `${before}@${username}#${userId} ${after}`;
            dropdown.classList.add('hidden');
            textarea.focus();
            
            const newCursorPos = activeMentionIndex + username.length + userId.length + 3; // '@', '#', space
            textarea.setSelectionRange(newCursorPos, newCursorPos);
        }

        // --- UTILS ---
        function showToast(message) {
            const snackbar = document.getElementById("snackbar");
            snackbar.innerText = message;
            snackbar.className = "show";
            setTimeout(() => { snackbar.className = snackbar.className.replace("show", ""); }, 3000);
        }

        function timeSince(unixTimestamp) {
            const seconds = Math.floor((new Date() - new Date(unixTimestamp * 1000)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "m";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m";
            return "Now";
        }

        async function apiRequest(endpoint, payload = {}, requiresAuth = true) {
            const headers = { 'Content-Type': 'application/json' };
            if (requiresAuth) {
                const token = AuthStorage.get();
                if (!token) throw new Error("No token found");
                headers['Authorization'] = `Bearer ${token}`;
            }
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'API Error');
                return data;
            } catch (err) {
                if (err instanceof TypeError || err.message === 'Failed to fetch' || err.name === 'TypeError') {
                    const serverUrl = localStorage.getItem('soshal_server_address') || 'https://dermal-brinda-marshier.ngrok-free.dev';
                    showToast("Connection failed! Launching browser window to bypass potential restrictions/warnings...");
                    setTimeout(() => { window.open(serverUrl, '_blank'); }, 1200);
                }
                throw err;
            }
        }

        // --- AUTH ---
        function toggleAuthMode() {
            isSignupMode = !isSignupMode;
            document.getElementById('auth-title').innerText = isSignupMode ? 'Create Account' : 'Login';
            document.getElementById('btn-submit-auth').innerText = isSignupMode ? 'Sign Up' : 'Login';
            document.getElementById('btn-toggle-auth').innerText = isSignupMode ? 'Already have an account? Login' : 'Need an account? Sign up';
        }

        async function submitAuth() {
            const serverVal = document.getElementById('auth-server').value.trim();
            if (!serverVal) return showToast("Server address is required");
            updateApiBase(serverVal);

            const u = document.getElementById('auth-username').value.trim();
            const p = document.getElementById('auth-password').value;
            if (!u || !p) return showToast("Username and password required");
            try {
                if (isSignupMode) {
                    await apiRequest('/signup', { username: u, password: p }, false);
                    showToast("Account created! Logging in...");
                    isSignupMode = false;
                }
                const data = await apiRequest('/login', { username: u, password: p }, false);
                AuthStorage.save(data.token, u); 
                document.getElementById('auth-password').value = '';
                document.getElementById('global-bottom-nav').classList.remove('hidden');
                openTab('global');
            } catch (err) {
                showToast(err.message);
            }
        }

        async function logout() {
            try { await apiRequest('/logout', {}); } catch (e) { }
            AuthStorage.clear();
            document.getElementById('global-bottom-nav').classList.add('hidden');
            switchView('view-auth');
        }

        // Render raw string content with clickable links for @Username handles
        function parseMentions(content) {
            return content.replace(/@([a-zA-Z0-9_-]+)(#[a-zA-Z0-9]{5})?/g, (match, username) => {
                return `<span class="text-[var(--md-sys-color-primary)] font-bold cursor-pointer hover:underline" onclick="event.stopPropagation(); openProfile('${username}')">${match}</span>`;
            });
        }

        // --- POST COMPONENT GENERATOR ---
        function createPostElement(post) {
            postCache[post.id] = post; 
            
            const isLiked = LikeStorage.has(post.id);
            const heartFill = isLiked ? "1" : "0";
            const heartColor = isLiked ? "#d93025" : "inherit";
            const heartClass = isLiked ? "liked" : "";
            
            const el = document.createElement('div');
            el.className = 'm3-card w-full';
            el.id = `post-card-${post.id}`;

            let imgHtml = post.image ? `
                <div class="w-full mt-3 rounded overflow-hidden border border-[var(--md-sys-color-outline)] cursor-pointer transition-opacity duration-200 active:opacity-80" onclick="openImageLightbox('${post.image}')">
                    <img src="${post.image}" class="w-full h-auto max-h-80 object-cover">
                </div>
            ` : '';

            const avatarBg = getAvatarColor(post.author);
            const parsedTextContent = parseMentions(post.content || "");

            el.innerHTML = `
                <div class="flex items-center gap-3 mb-3">
                    <div class="avatar-square cursor-pointer" style="background-color: ${avatarBg}" onclick="openProfile('${post.author}')">${post.author.charAt(0).toUpperCase()}</div>
                    <div class="flex-1">
                        <div class="font-bold text-base cursor-pointer hover:underline inline-block transition-colors duration-200" onclick="openProfile('${post.author}')">${post.author}</div>
                        <div class="text-xs opacity-70">${timeSince(post.timestamp)}</div>
                    </div>
                </div>
                <div class="text-[17px] leading-relaxed break-words whitespace-pre-wrap">${parsedTextContent}</div>
                ${imgHtml}
                
                <div class="flex justify-between items-center mt-3 pt-2 border-t border-[var(--md-sys-color-outline)]">
                    <div class="action-btn ${heartClass}" id="btn-like-${post.id}" onclick="toggleLike('${post.id}')">
                        <span class="material-symbols-outlined transition-transform duration-200" id="icon-like-${post.id}" style="font-variation-settings: 'FILL' ${heartFill}; color: ${heartColor}">favorite</span>
                        <span class="font-medium" id="count-like-${post.id}">${post.likes || 0}</span>
                    </div>
                    <div class="action-btn" onclick="sharePost('${post.id}')">
                        <span class="material-symbols-outlined">share</span>
                    </div>
                </div>
            `;
            return el;
        }

        // --- FEED RENDERING ---
        async function fetchFeedPosts(feedType) {
            const container = document.getElementById('main-feed-container');
            container.innerHTML = '<div class="text-center mt-10 opacity-70 fade-up-item">Loading...</div>';
            
            try {
                const data = await apiRequest('/posts/list', { limit: 50, feed_type: feedType });
                container.innerHTML = '';
                
                if (feedType === 'following' && data.is_following_empty) {
                    container.innerHTML = `
                        <div class="text-center mt-20 opacity-70 px-4 fade-up-item">
                            You aren't following anyone yet or they haven't posted.<br><br>Switch to Explore to find friends!
                        </div>`;
                    return;
                }

                if (!data.posts || data.posts.length === 0) {
                    container.innerHTML = '<div class="text-center mt-20 opacity-70 fade-up-item">No posts found.</div>';
                    return;
                }

                data.posts.forEach((post, index) => {
                    const el = createPostElement(post);
                    el.classList.add('fade-up-item');
                    el.style.animationDelay = `${index * 0.05}s`;
                    container.appendChild(el);
                });
            } catch (err) {
                if(err.message.includes("Invalid or expired token")) {
                    logout();
                } else {
                    container.innerHTML = '<div class="text-center mt-10 opacity-70 text-red-400 fade-up-item">Could not connect to server.</div>';
                }
            }
        }

        // --- SEARCH ENGINE ---
        function setSearchType(type) {
            currentSearchType = type;
            const btnPosts = document.getElementById('search-type-posts');
            const btnUsers = document.getElementById('search-type-users');
            if (type === 'posts') {
                btnPosts.style.backgroundColor = 'var(--md-sys-color-primary)';
                btnPosts.style.color = 'var(--md-sys-color-on-primary)';
                btnUsers.style.backgroundColor = 'transparent';
                btnUsers.style.color = 'var(--md-sys-color-on-surface)';
            } else {
                btnUsers.style.backgroundColor = 'var(--md-sys-color-primary)';
                btnUsers.style.color = 'var(--md-sys-color-on-primary)';
                btnPosts.style.backgroundColor = 'transparent';
                btnPosts.style.color = 'var(--md-sys-color-on-surface)';
            }
            performSearch();
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(performSearch, 300);
        }

        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            const container = document.getElementById('search-results-container');
            
            if (!query) {
                container.innerHTML = '<div class="text-center mt-20 opacity-70">Start typing to search Soshal...</div>';
                return;
            }

            container.innerHTML = '<div class="text-center opacity-70 mt-20">Searching...</div>';

            try {
                const data = await apiRequest('/search', { query: query, type: currentSearchType });
                container.innerHTML = '';

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = '<div class="text-center opacity-70 mt-20">No results found.</div>';
                    return;
                }

                if (currentSearchType === 'users') {
                    data.results.forEach((user, idx) => {
                        const avatarBg = getAvatarColor(user.username);
                        const card = document.createElement('div');
                        card.className = 'm3-card mb-3 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform fade-up-item';
                        card.style.animationDelay = `${idx * 0.05}s`;
                        card.onclick = () => {
                            openProfile(user.username);
                        };
                        card.innerHTML = `
                            <div class="flex items-center gap-3">
                                <div class="avatar-square" style="background-color: ${avatarBg}">
                                    ${user.username.charAt(0).toUpperCase()}
                                </div>
                                <div class="flex flex-col">
                                    <div class="font-bold flex items-baseline gap-1">
                                        <span>${user.username}</span>
                                        <span class="text-xs opacity-50 font-normal">#${user.user_id}</span>
                                    </div>
                                    <div class="text-xs opacity-70">${user.followers_count} Followers &bull; ${user.following_count} Following</div>
                                </div>
                            </div>
                            <span class="material-symbols-outlined opacity-70">chevron_right</span>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    data.results.forEach((post, idx) => {
                        const el = createPostElement(post);
                        el.classList.add('fade-up-item');
                        el.style.animationDelay = `${idx * 0.05}s`;
                        container.appendChild(el);
                    });
                }
            } catch (err) {
                container.innerHTML = '<div class="text-center text-red-400 mt-20">Search failed.</div>';
            }
        }

        // --- PROFILE LOADING ---
        async function openProfile(username, isOwnProfileTab = false) {
            currentProfileUser = username;
            switchView('view-profile');
            
            // Handle Back Button logic
            const backBtn = document.getElementById('profile-back-btn');
            if (isOwnProfileTab) {
                backBtn.style.display = 'none';
            } else {
                backBtn.style.display = 'block';
                if (currentTab === 'search') {
                    backBtn.onclick = () => openTab('search');
                } else {
                    backBtn.onclick = () => openTab('global');
                }
            }

            document.getElementById('profile-header-title').innerText = username;
            document.getElementById('profile-username').innerText = username;
            document.getElementById('profile-avatar').innerText = username.charAt(0).toUpperCase();
            document.getElementById('profile-avatar').style.backgroundColor = getAvatarColor(username);
            
            const isSelf = (username === AuthStorage.getUser());
            const logoutBtn = document.getElementById('profile-logout-btn');
            
            if (isSelf) {
                logoutBtn.classList.remove('hidden');
            } else {
                logoutBtn.classList.add('hidden');
            }

            const container = document.getElementById('profile-posts-container');
            container.innerHTML = '<div class="text-center mt-8 fade-up-item">Loading profile...</div>';

            try {
                const profileData = await apiRequest('/users/profile', { username: username });
                document.getElementById('profile-followers').innerText = profileData.followers_count;
                document.getElementById('profile-following').innerText = profileData.following_count;
                
                // Show discriminator user_id
                const discEl = document.getElementById('profile-discriminator');
                if (profileData.user_id) {
                    discEl.innerText = `#${profileData.user_id}`;
                } else {
                    discEl.innerText = '';
                }

                const followBtn = document.getElementById('btn-follow');
                
                if (profileData.is_self) {
                    followBtn.style.display = 'none';
                    logoutBtn.classList.remove('hidden');
                } else {
                    followBtn.style.display = 'block';
                    logoutBtn.classList.add('hidden');
                    isFollowingCurrentProfile = profileData.is_following;
                    followBtn.innerText = isFollowingCurrentProfile ? 'Unfollow' : 'Follow';
                    followBtn.style.backgroundColor = isFollowingCurrentProfile ? 'var(--md-sys-color-surface-variant)' : 'var(--md-sys-color-primary)';
                    followBtn.style.color = isFollowingCurrentProfile ? 'var(--md-sys-color-on-surface)' : 'var(--md-sys-color-on-primary)';
                }

                const postsData = await apiRequest('/posts/user', { username: username, limit: 50 });
                container.innerHTML = '';
                
                if (postsData.posts.length === 0) {
                    container.innerHTML = '<div class="text-center mt-8 opacity-70 fade-up-item">No posts yet.</div>';
                } else {
                    postsData.posts.forEach((post, index) => {
                        const el = createPostElement(post);
                        el.classList.add('fade-up-item');
                        el.style.animationDelay = `${index * 0.05}s`;
                        container.appendChild(el);
                    });
                }
            } catch(e) {
                container.innerHTML = `
                    <div class="text-center mt-8 text-red-400 p-4 fade-up-item">
                        Could not load profile details.<br><br>
                        Verify your server configuration or tap the logout button above to troubleshoot.
                    </div>
                `;
            }
        }

        async function toggleFollow() {
            if(!currentProfileUser) return;
            const action = isFollowingCurrentProfile ? 'unfollow' : 'follow';
            try {
                await apiRequest('/users/follow', { target_user: currentProfileUser, action: action });
                
                isFollowingCurrentProfile = !isFollowingCurrentProfile;
                const followBtn = document.getElementById('btn-follow');
                followBtn.innerText = isFollowingCurrentProfile ? 'Unfollow' : 'Follow';
                followBtn.style.backgroundColor = isFollowingCurrentProfile ? 'var(--md-sys-color-surface-variant)' : 'var(--md-sys-color-primary)';
                followBtn.style.color = isFollowingCurrentProfile ? 'var(--md-sys-color-on-surface)' : 'var(--md-sys-color-on-primary)';
                
                let count = parseInt(document.getElementById('profile-followers').innerText);
                document.getElementById('profile-followers').innerText = isFollowingCurrentProfile ? count + 1 : count - 1;
                
                showToast(`${isFollowingCurrentProfile ? 'Followed' : 'Unfollowed'} ${currentProfileUser}`);
            } catch(e) {
                showToast(e.message);
            }
        }

        // --- POST INTERACTIONS ---
        async function toggleLike(postId) {
            const post = postCache[postId];
            if (!post) return;

            const isLiked = LikeStorage.has(postId);
            const action = isLiked ? 'unlike' : 'like';

            const icons = document.querySelectorAll(`#icon-like-${postId}`);
            const counts = document.querySelectorAll(`#count-like-${postId}`);
            const btns = document.querySelectorAll(`#btn-like-${postId}`);

            if (isLiked) {
                LikeStorage.remove(postId);
                post.likes = Math.max(0, (post.likes || 1) - 1);
                icons.forEach(i => { i.style.fontVariationSettings = "'FILL' 0"; i.style.color = "inherit"; });
                btns.forEach(b => b.classList.remove('liked'));
            } else {
                LikeStorage.add(postId);
                post.likes = (post.likes || 0) + 1;
                icons.forEach(i => { 
                    i.style.fontVariationSettings = "'FILL' 1"; 
                    i.style.color = "#d93025"; 
                    i.style.transform = "scale(1.3)";
                    setTimeout(() => i.style.transform = "scale(1)", 200);
                });
                btns.forEach(b => b.classList.add('liked'));
            }
            
            counts.forEach(c => c.innerText = post.likes);

            try {
                await apiRequest('/posts/like', { post_id: postId, action: action });
            } catch (err) {
                console.error("Like sync failed", err);
            }
        }

        function sharePost(postId) {
            const post = postCache[postId];
            if (!post) return;
            const textToShare = `"${post.content}" - ${post.author} on Soshal`;
            try {
                const el = document.createElement('textarea');
                el.value = textToShare;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("Copied to clipboard!");
            } catch (err) {
                showToast("Couldn't copy text.");
            }
        }

        // --- CREATE POST / MEDIA ---
        function handleImageSelection(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) return showToast("Please select a valid image file.");

            const reader = new FileReader();
            reader.onload = function(e) {
                currentSelectedImage = e.target.result;
                const container = document.getElementById('image-preview-container');
                document.getElementById('image-preview').src = currentSelectedImage;
                container.classList.remove('hidden');
                
                container.style.animation = 'none';
                void container.offsetWidth;
                container.style.animation = '';
            };
            reader.readAsDataURL(file);
        }

        function clearImageSelection() {
            currentSelectedImage = null;
            document.getElementById('image-input').value = "";
            document.getElementById('image-preview').src = "";
            document.getElementById('image-preview-container').classList.add('hidden');
        }

        async function submitPost() {
            const content = document.getElementById('create-post-content').value.trim();
            if (!content && !currentSelectedImage) return showToast("Post cannot be empty.");

            try {
                await apiRequest('/posts/create', { content: content, image: currentSelectedImage });
                document.getElementById('create-post-content').value = '';
                clearImageSelection();
                showToast("Posted successfully!");
                closeCreateView();
                
                if (currentTab === 'global' || currentTab === 'following') {
                    fetchFeedPosts(currentTab);
                } else if (currentTab === 'profile') {
                    openProfile(currentProfileUser, true);
                } else if (currentTab === 'search') {
                    performSearch();
                }
            } catch (err) {
                showToast(err.message);
            }
        }

        // --- LIGHTBOX ---
        function openImageLightbox(src) {
            const lightbox = document.getElementById('image-lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            void lightbox.offsetWidth; // Force reflow
            lightbox.classList.remove('opacity-0');
            lightbox.classList.add('opacity-100');
            img.classList.remove('scale-95');
            img.classList.add('scale-100');
        }

        function closeImageLightbox() {
            const lightbox = document.getElementById('image-lightbox');
            const img = document.getElementById('lightbox-img');
            lightbox.classList.remove('opacity-100');
            lightbox.classList.add('opacity-0');
            img.classList.remove('scale-100');
            img.classList.add('scale-95');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
                img.src = '';
            }, 300);
        }
    </script>
</body>
</html>
